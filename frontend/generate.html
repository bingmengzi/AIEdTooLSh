<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成动画 - AiEdToolsH</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 旋转动画 */
        .animate-spin-slow {
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 代码预览区域 */
        .code-preview-box {
            background: #1E293B;
            color: #94A3B8;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        /* 时间线连接线 */
        .timeline-line {
            position: absolute;
            left: 23px;
            top: 48px;
            bottom: 0;
            width: 2px;
            background: #E5E7EB;
        }
        .timeline-node:last-child .timeline-line {
            display: none;
        }
        /* 模式选择卡片悬停效果 */
        .mode-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen">
    <div class="min-h-screen py-8 px-4 page-enter">
        <!-- 顶部导航 -->
        <div class="max-w-3xl mx-auto mb-8">
            <div class="flex items-center justify-between">
                <!-- 返回首页 -->
                <a href="index.html" class="back-btn inline-flex items-center gap-2 text-gray-600 hover:text-gray-800 px-3 py-2 rounded-lg">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>返回首页</span>
                </a>
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-[#1E293B] rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
                    </div>
                    <span class="font-semibold text-[#1E293B]">AiEdToolsH</span>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="max-w-3xl mx-auto">
            <!-- 标题区域 -->
            <div class="text-center mb-6">
                <h1 id="page-title" class="text-2xl font-bold text-[#1E293B] mb-2">生成交互动画</h1>
                <p class="text-gray-500">
                    <span class="text-gray-400">查询：</span>
                    <span id="query-display" class="text-gray-700 font-medium"></span>
                </p>
            </div>
            
            <!-- 模式选择区域 -->
            <div id="mode-selector" class="max-w-2xl mx-auto mt-8">
                <h2 class="text-center text-lg text-gray-600 mb-6">选择生成模式</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- 默认流程 -->
                    <button id="btn-default" onclick="startDefaultMode()" class="mode-card group p-6 bg-white rounded-xl shadow-md border-2 border-transparent hover:border-blue-500 transition-all duration-200 text-left">
                        <div class="text-3xl mb-3"><i class="fa-solid fa-bolt text-blue-500"></i></div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">默认生成流程</h3>
                        <p class="text-sm text-gray-500">自动选择最优模型，含降级策略，一键完成全部流程</p>
                    </button>
                    <!-- 自定义模型 -->
                    <button id="btn-custom" onclick="startCustomMode()" class="mode-card group p-6 bg-white rounded-xl shadow-md border-2 border-transparent hover:border-purple-500 transition-all duration-200 text-left">
                        <div class="text-3xl mb-3"><i class="fa-solid fa-sliders text-purple-500"></i></div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">自定义模型（分步）</h3>
                        <p class="text-sm text-gray-500">逐步执行，每个阶段手动选择AI模型</p>
                    </button>
                </div>
            </div>
            
            <!-- 错误信息区域 (初始隐藏) -->
            <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span id="error-text">发生错误</span>
                </div>
            </div>
            
            <!-- 时间线容器 (初始隐藏) -->
            <div id="timeline-container" class="hidden">
                <!-- 时间线节点 -->
                <div class="space-y-4 mb-8 relative">
                    <!-- 节点1: 学科分析 -->
                    <div id="node-analysis" class="timeline-node relative" data-node="analysis">
                        <div class="timeline-line"></div>
                        <div class="node-card flex gap-4">
                            <div class="node-icon waiting w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 z-10 flex-shrink-0">
                                <i class="fa-solid fa-magnifying-glass text-lg"></i>
                            </div>
                            <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800">学科分析</h3>
                                    <span class="node-time text-xs text-gray-400">等待中</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1">识别学科领域和知识点类型</p>
                                <div class="node-details mt-3 pt-3 border-t border-gray-100 hidden"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 节点2: DSL生成 -->
                    <div id="node-dsl" class="timeline-node relative" data-node="dsl">
                        <div class="timeline-line"></div>
                        <div class="node-card flex gap-4">
                            <div class="node-icon waiting w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 z-10 flex-shrink-0">
                                <i class="fa-solid fa-code text-lg"></i>
                            </div>
                            <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800">DSL 生成</h3>
                                    <span class="node-time text-xs text-gray-400">等待中</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1">生成场景描述语言</p>
                                <div class="node-details mt-3 pt-3 border-t border-gray-100 hidden"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 节点3: Runtime引擎 -->
                    <div id="node-runtime" class="timeline-node relative" data-node="runtime">
                        <div class="timeline-line"></div>
                        <div class="node-card flex gap-4">
                            <div class="node-icon waiting w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 z-10 flex-shrink-0">
                                <i class="fa-solid fa-gears text-lg"></i>
                            </div>
                            <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800">Runtime 引擎</h3>
                                    <span class="node-time text-xs text-gray-400">等待中</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1">选择渲染模板并构建Prompt</p>
                                <div class="node-details mt-3 pt-3 border-t border-gray-100 hidden"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 节点4: HTML生成 -->
                    <div id="node-html" class="timeline-node relative" data-node="html">
                        <div class="timeline-line"></div>
                        <div class="node-card flex gap-4">
                            <div class="node-icon waiting w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 z-10 flex-shrink-0">
                                <i class="fa-solid fa-file-code text-lg"></i>
                            </div>
                            <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800">HTML 生成</h3>
                                    <span class="node-time text-xs text-gray-400">等待中</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1">流式生成可交互的HTML页面</p>
                                <div class="node-details mt-3 pt-3 border-t border-gray-100 hidden"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 节点5: 完成 -->
                    <div id="node-complete" class="timeline-node relative" data-node="complete">
                        <div class="node-card flex gap-4">
                            <div class="node-icon waiting w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 z-10 flex-shrink-0">
                                <i class="fa-solid fa-circle-check text-lg"></i>
                            </div>
                            <div class="flex-1 bg-white rounded-xl border p-4 shadow-sm">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-gray-800">完成</h3>
                                    <span class="node-time text-xs text-gray-400">等待中</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1">交互动画生成完毕</p>
                                <div class="node-details mt-3 pt-3 border-t border-gray-100 hidden"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 查看结果按钮 -->
                <div class="text-center">
                    <button 
                        id="view-result-btn"
                        class="bg-blue-600 opacity-50 cursor-not-allowed text-white px-8 py-3 rounded-full font-medium shadow-lg inline-flex items-center gap-2"
                        disabled
                    >
                        <i class="fa-solid fa-external-link-alt"></i>
                        <span>在新标签页查看结果</span>
                    </button>
                    <p class="text-sm text-gray-400 mt-3" id="result-hint">生成完成后可查看交互动画</p>
                </div>
            </div>
        </div>
        
        <!-- 底部版权 -->
        <footer class="text-center text-gray-400 text-sm mt-16">
            Copyright © 2026 AiEdToolsH. All rights reserved.
        </footer>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/generate.js?v=2"></script>
</body>
</html>
