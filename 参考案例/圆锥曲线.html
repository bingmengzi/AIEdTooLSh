<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圆锥曲线互动探索器</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F5F7FB; /* 护眼浅蓝灰背景 */
            margin: 0;
            overflow: hidden; /* 防止移动端滚动 */
        }
        /* 自定义滑块样式，使其更适合触摸 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid currentColor;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #E2E8F0;
            border-radius: 3px;
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
        .math-font {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-6 lg:p-8 box-border">

    <!-- 顶部标题区 -->
    <header class="mb-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-blue-500 text-white flex items-center justify-center text-2xl shadow-lg shadow-blue-500/30">
                <i class="fa-solid fa-shapes"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-wide">圆锥曲线探索器</h1>
                <p class="text-gray-500 text-sm">动态调节参数，探索几何奥秘</p>
            </div>
        </div>
        <div class="hidden md:flex gap-2 text-sm text-gray-500 bg-white px-4 py-2 rounded-full shadow-sm">
            <span class="flex items-center gap-1"><i class="fa-solid fa-hand-pointer text-yellow-500"></i> 拖动下方滑块试试</span>
        </div>
    </header>

    <!-- 主体内容区 -->
    <main class="flex-1 flex flex-col lg:flex-row gap-6 h-[calc(100vh-8rem)]">
        
        <!-- 左侧控制台 -->
        <aside class="w-full lg:w-[380px] bg-white rounded-3xl shadow-lg flex flex-col overflow-hidden shrink-0 border border-gray-100">
            
            <!-- 选项卡 -->
            <div class="flex p-2 bg-gray-50">
                <button onclick="switchType('ellipse')" id="tab-ellipse" class="tab-btn flex-1 py-3 text-center rounded-2xl font-bold text-blue-600 bg-white shadow-sm ring-1 ring-black/5">
                    椭圆
                </button>
                <button onclick="switchType('hyperbola')" id="tab-hyperbola" class="tab-btn flex-1 py-3 text-center rounded-2xl font-bold text-gray-500 hover:bg-gray-100">
                    双曲线
                </button>
                <button onclick="switchType('parabola')" id="tab-parabola" class="tab-btn flex-1 py-3 text-center rounded-2xl font-bold text-gray-500 hover:bg-gray-100">
                    抛物线
                </button>
            </div>

            <!-- 参数控制区 -->
            <div class="p-6 flex-1 flex flex-col gap-6 overflow-y-auto">
                
                <!-- 椭圆/双曲线 控制 -->
                <div id="controls-ab" class="flex flex-col gap-6">
                    <div class="bg-blue-50/50 p-4 rounded-2xl">
                        <div class="flex justify-between mb-2">
                            <label class="font-bold text-gray-700 flex items-center gap-2">
                                <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm math-font">a</span>
                                <span id="label-a-text">长半轴 / 实半轴</span>
                            </label>
                            <span id="val-a" class="font-bold text-blue-600 text-lg">5.0</span>
                        </div>
                        <input type="range" id="slider-a" min="1" max="10" step="0.1" value="5" class="text-blue-500">
                    </div>

                    <div class="bg-red-50/50 p-4 rounded-2xl">
                        <div class="flex justify-between mb-2">
                            <label class="font-bold text-gray-700 flex items-center gap-2">
                                <span class="w-6 h-6 rounded-full bg-red-100 text-red-600 flex items-center justify-center text-sm math-font">b</span>
                                <span id="label-b-text">短半轴 / 虚半轴</span>
                            </label>
                            <span id="val-b" class="font-bold text-red-600 text-lg">3.0</span>
                        </div>
                        <input type="range" id="slider-b" min="1" max="10" step="0.1" value="3" class="text-red-500">
                    </div>
                </div>

                <!-- 抛物线 控制 -->
                <div id="controls-p" class="flex flex-col gap-6 hidden">
                    <div class="bg-green-50/50 p-4 rounded-2xl">
                        <div class="flex justify-between mb-2">
                            <label class="font-bold text-gray-700 flex items-center gap-2">
                                <span class="w-6 h-6 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-sm math-font">p</span>
                                焦准距
                            </label>
                            <span id="val-p" class="font-bold text-green-600 text-lg">4.0</span>
                        </div>
                        <input type="range" id="slider-p" min="1" max="10" step="0.1" value="4" class="text-green-500">
                    </div>
                </div>

                <!-- 数学信息展示区 -->
                <div class="mt-auto bg-gray-800 text-white rounded-2xl p-5 shadow-inner">
                    <div class="text-xs text-gray-400 mb-1 uppercase tracking-wider">标准方程 (焦点在x轴)</div>
                    <div id="math-equation" class="text-2xl math-font text-yellow-300 mb-4 tracking-widest text-center py-2 bg-gray-900 rounded-xl">
                        x²/a² + y²/b² = 1
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-700/50 p-3 rounded-xl text-center">
                            <div class="text-gray-400 text-xs mb-1">焦距/参数 (<span class="math-font">c/p</span>)</div>
                            <div id="math-c" class="font-bold text-lg math-font text-white">4.00</div>
                        </div>
                        <div class="bg-gray-700/50 p-3 rounded-xl text-center">
                            <div class="text-gray-400 text-xs mb-1">离心率 (<span class="math-font">e</span>)</div>
                            <div id="math-e" class="font-bold text-lg math-font text-white">0.80</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧画布 -->
        <section class="flex-1 bg-white rounded-3xl shadow-lg relative overflow-hidden border border-gray-100 flex items-center justify-center">
            <!-- 坐标轴图例 -->
            <div class="absolute top-4 left-4 flex gap-3 text-sm font-bold bg-white/80 backdrop-blur px-3 py-1.5 rounded-lg shadow-sm">
                <span class="flex items-center gap-1 text-gray-600"><span class="w-3 h-3 rounded-full bg-gray-400"></span> 原点</span>
                <span class="flex items-center gap-1 text-orange-500"><span class="w-3 h-3 rounded-full bg-orange-500"></span> 焦点</span>
            </div>
            
            <canvas id="mathCanvas" class="w-full h-full touch-none"></canvas>
        </section>

    </main>

    <script>
        // --- 核心状态 ---
        let currentType = 'ellipse'; // ellipse, hyperbola, parabola
        let params = { a: 5, b: 3, p: 4 };
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        const pixelsPerUnit = 25; // 坐标系比例尺：1个数学单位 = 25像素
        
        let cx, cy; // 画布中心坐标

        // --- DOM 元素引用 ---
        const sliderA = document.getElementById('slider-a');
        const sliderB = document.getElementById('slider-b');
        const sliderP = document.getElementById('slider-p');
        
        // --- 初始化与事件监听 ---
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            sliderA.addEventListener('input', (e) => { params.a = parseFloat(e.target.value); updateUI(); });
            sliderB.addEventListener('input', (e) => { params.b = parseFloat(e.target.value); updateUI(); });
            sliderP.addEventListener('input', (e) => { params.p = parseFloat(e.target.value); updateUI(); });

            updateUI();
        }

        // --- 画布自适应高清处理 ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            
            cx = rect.width / 2;
            cy = rect.height / 2;
            
            render();
        }

        // --- 切换曲线类型 ---
        window.switchType = function(type) {
            currentType = type;
            
            // 重置Tab样式
            ['ellipse', 'hyperbola', 'parabola'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = 'tab-btn flex-1 py-3 text-center rounded-2xl font-bold text-gray-500 hover:bg-gray-100';
            });
            
            // 设置当前选中Tab样式与主题色
            const activeBtn = document.getElementById(`tab-${type}`);
            let themeColor = 'blue';
            if(type === 'hyperbola') themeColor = 'red';
            if(type === 'parabola') themeColor = 'green';
            
            activeBtn.className = `tab-btn flex-1 py-3 text-center rounded-2xl font-bold text-${themeColor}-600 bg-white shadow-sm ring-1 ring-black/5`;

            // 切换控制区显示
            if (type === 'parabola') {
                document.getElementById('controls-ab').classList.add('hidden');
                document.getElementById('controls-p').classList.remove('hidden');
            } else {
                document.getElementById('controls-ab').classList.remove('hidden');
                document.getElementById('controls-p').classList.add('hidden');
                
                document.getElementById('label-a-text').innerText = type === 'ellipse' ? '长半轴 a' : '实半轴 a';
                document.getElementById('label-b-text').innerText = type === 'ellipse' ? '短半轴 b' : '虚半轴 b';
            }
            
            updateUI();
        }

        // --- 更新 UI 数据和图表 ---
        function updateUI() {
            // 更新数值显示
            document.getElementById('val-a').innerText = params.a.toFixed(1);
            document.getElementById('val-b').innerText = params.b.toFixed(1);
            document.getElementById('val-p').innerText = params.p.toFixed(1);

            let eqHTML = '';
            let valC = 0;
            let valE = 0;

            if (currentType === 'ellipse') {
                // 判断焦点在x轴还是y轴
                if (params.a >= params.b) {
                    eqHTML = `x²/${(params.a*params.a).toFixed(1)} + y²/${(params.b*params.b).toFixed(1)} = 1`;
                    valC = Math.sqrt(params.a*params.a - params.b*params.b);
                    valE = valC / params.a;
                } else {
                    eqHTML = `y²/${(params.b*params.b).toFixed(1)} + x²/${(params.a*params.a).toFixed(1)} = 1`;
                    valC = Math.sqrt(params.b*params.b - params.a*params.a);
                    valE = valC / params.b;
                }
            } else if (currentType === 'hyperbola') {
                eqHTML = `x²/${(params.a*params.a).toFixed(1)} - y²/${(params.b*params.b).toFixed(1)} = 1`;
                valC = Math.sqrt(params.a*params.a + params.b*params.b);
                valE = valC / params.a;
            } else if (currentType === 'parabola') {
                eqHTML = `y² = ${(2*params.p).toFixed(1)}x`;
                valC = params.p / 2; // 这里展示p/2作为焦点坐标值
                valE = 1.0;
            }

            document.getElementById('math-equation').innerHTML = eqHTML;
            document.getElementById('math-c').innerText = valC.toFixed(2);
            document.getElementById('math-e').innerText = valE.toFixed(2);

            render();
        }

        // --- 坐标系辅助函数 ---
        // 数学坐标 -> 屏幕坐标
        function toScreen(mathX, mathY) {
            return {
                x: cx + mathX * pixelsPerUnit,
                y: cy - mathY * pixelsPerUnit // 屏幕Y轴向下，数学Y轴向上
            };
        }

        // --- Canvas 绘图主循环 ---
        function render() {
            const width = canvas.width / (window.devicePixelRatio || 1);
            const height = canvas.height / (window.devicePixelRatio || 1);
            
            // 清空画布
            ctx.clearRect(0, 0, width, height);

            drawGrid(width, height);
            drawAxes(width, height);

            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';

            if (currentType === 'ellipse') {
                drawEllipse();
            } else if (currentType === 'hyperbola') {
                drawHyperbola(width, height);
            } else if (currentType === 'parabola') {
                drawParabola(height);
            }
        }

        // 画网格
        function drawGrid(w, h) {
            ctx.strokeStyle = '#F1F5F9';
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            // 垂直线
            for (let i = cx % pixelsPerUnit; i < w; i += pixelsPerUnit) {
                ctx.moveTo(i, 0); ctx.lineTo(i, h);
            }
            // 水平线
            for (let i = cy % pixelsPerUnit; i < h; i += pixelsPerUnit) {
                ctx.moveTo(0, i); ctx.lineTo(w, i);
            }
            ctx.stroke();
        }

        // 画坐标轴
        function drawAxes(w, h) {
            ctx.strokeStyle = '#94A3B8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // X轴
            ctx.moveTo(0, cy); ctx.lineTo(w, cy);
            // Y轴
            ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
            ctx.stroke();

            // 箭头
            ctx.fillStyle = '#94A3B8';
            ctx.beginPath();
            ctx.moveTo(w, cy); ctx.lineTo(w - 10, cy - 4); ctx.lineTo(w - 10, cy + 4);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(cx, 0); ctx.lineTo(cx - 4, 10); ctx.lineTo(cx + 4, 10);
            ctx.fill();

            // 原点
            drawPoint(0, 0, '#64748B', 4);
        }

        // 画点（用于焦点、顶点）
        function drawPoint(mathX, mathY, color, radius = 5) {
            const pt = toScreen(mathX, mathY);
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 绘制椭圆
        function drawEllipse() {
            const { a, b } = params;
            ctx.strokeStyle = '#3B82F6'; // Blue
            ctx.beginPath();
            for (let t = 0; t <= Math.PI * 2 + 0.1; t += 0.05) {
                const x = a * Math.cos(t);
                const y = b * Math.sin(t);
                const pt = toScreen(x, y);
                if (t === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 焦点
            let c = Math.sqrt(Math.abs(a*a - b*b));
            const focusColor = '#F97316'; // Orange
            if (a >= b) {
                drawPoint(c, 0, focusColor);
                drawPoint(-c, 0, focusColor);
            } else {
                drawPoint(0, c, focusColor);
                drawPoint(0, -c, focusColor);
            }
        }

        // 双曲函数辅助
        const cosh = t => (Math.exp(t) + Math.exp(-t)) / 2;
        const sinh = t => (Math.exp(t) - Math.exp(-t)) / 2;

        // 绘制双曲线
        function drawHyperbola(w, h) {
            const { a, b } = params;
            ctx.strokeStyle = '#EF4444'; // Red
            
            // 渐近线
            ctx.beginPath();
            ctx.strokeStyle = '#FCA5A5';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            // y = (b/a)x
            let p1 = toScreen(-w/pixelsPerUnit, -(b/a)*(w/pixelsPerUnit));
            let p2 = toScreen(w/pixelsPerUnit, (b/a)*(w/pixelsPerUnit));
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            // y = -(b/a)x
            p1 = toScreen(-w/pixelsPerUnit, (b/a)*(w/pixelsPerUnit));
            p2 = toScreen(w/pixelsPerUnit, -(b/a)*(w/pixelsPerUnit));
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.setLineDash([]); // 恢复实线

            ctx.strokeStyle = '#EF4444';
            ctx.lineWidth = 3;

            // 右支: x = a*cosh(t), y = b*sinh(t)
            ctx.beginPath();
            for (let t = -3; t <= 3; t += 0.05) {
                const x = a * cosh(t);
                const y = b * sinh(t);
                const pt = toScreen(x, y);
                if (t === -3) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 左支
            ctx.beginPath();
            for (let t = -3; t <= 3; t += 0.05) {
                const x = -a * cosh(t);
                const y = b * sinh(t);
                const pt = toScreen(x, y);
                if (t === -3) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 焦点 c = sqrt(a^2 + b^2)
            let c = Math.sqrt(a*a + b*b);
            drawPoint(c, 0, '#F97316');
            drawPoint(-c, 0, '#F97316');
        }

        // 绘制抛物线 (y^2 = 2px)
        function drawParabola(h) {
            const { p } = params;
            ctx.strokeStyle = '#22C55E'; // Green
            ctx.beginPath();
            
            // 参数方程 x = t^2 / (2p), y = t
            // t 的范围取决于屏幕高度
            const maxT = (h / 2) / pixelsPerUnit + 5; 
            
            for (let t = -maxT; t <= maxT; t += 0.1) {
                const x = (t * t) / (2 * p);
                const y = t;
                const pt = toScreen(x, y);
                if (t === -maxT) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();

            // 焦点 p/2
            drawPoint(p/2, 0, '#F97316');

            // 准线 x = -p/2
            ctx.beginPath();
            ctx.strokeStyle = '#86EFAC';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            const pt1 = toScreen(-p/2, maxT);
            const pt2 = toScreen(-p/2, -maxT);
            ctx.moveTo(pt1.x, pt1.y);
            ctx.lineTo(pt2.x, pt2.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // 启动应用
        init();

    </script>
</body>
</html>
