<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对数函数动态讲解 - Logarithm Visualizer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js (虽手写Canvas更灵活，但这里为了极致性能和控制使用原生Canvas) -->
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f0f4f8;
            color: #334155;
            overflow-x: hidden;
        }

        /* 自定义滑块样式 */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            margin-top: -8px; 
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #cbd5e1;
            border-radius: 2px;
        }
        
        /* 辉光卡片效果 */
        .glow-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px -5px rgba(99, 102, 241, 0.15), 
                        0 0 20px rgba(255, 255, 255, 0.8) inset;
            transition: transform 0.3s ease;
        }

        /* 数学公式字体优化 */
        .math-font {
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(to bottom right, #ffffff, #f8fafc);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
        }
        
        /* 关键点标记动画 */
        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        .highlight-dot {
            animation: pulse-dot 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <!-- 标题区域 -->
    <header class="text-center mb-8 animate-fade-in-down">
        <h1 class="text-4xl font-bold text-slate-800 mb-2 tracking-tight">
            <span class="text-indigo-500">Log</span>arithm 可视化
        </h1>
        <p class="text-slate-500">探索对数函数的奥秘：指数的逆运算</p>
    </header>

    <!-- 主内容区域：左右布局 -->
    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- 左侧：控制面板与数学解释 -->
        <div class="lg:col-span-1 space-y-6">
            
            <!-- 核心公式卡片 -->
            <div class="glow-card p-6 rounded-2xl">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 border-l-4 border-indigo-500 pl-3">核心定义</h2>
                <div class="flex flex-col items-center justify-center space-y-4 bg-indigo-50/50 p-4 rounded-xl border border-indigo-100">
                    <div class="text-2xl">
                        <span class="math-font">y</span> = log<sub class="math-font text-indigo-600 text-sm" id="disp-base-sub">2</sub>(<span class="math-font text-rose-500" id="disp-x-val">8</span>)
                    </div>
                    <div class="text-slate-400 text-sm"><i class="fas fa-arrow-down animate-bounce"></i> 互为逆运算</div>
                    <div class="text-2xl">
                        <span class="math-font text-indigo-600" id="disp-base-pow">2</span><sup class="math-font text-slate-800" id="disp-y-pow">3</sup> = <span class="math-font text-rose-500" id="disp-result">8</span>
                    </div>
                </div>
                <p class="mt-4 text-sm text-slate-600 leading-relaxed">
                    对数询问的是：<br>
                    "为了得到 <span class="text-rose-500 font-bold">x</span>，底数 <span class="text-indigo-600 font-bold">a</span> 需要自乘多少次？"
                </p>
            </div>

            <!-- 控制器 -->
            <div class="glow-card p-6 rounded-2xl">
                <h2 class="text-lg font-semibold text-slate-700 mb-4 border-l-4 border-emerald-500 pl-3">参数调节</h2>
                
                <!-- 底数 a 控制 -->
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-medium text-slate-600">底数 (Base) <span class="math-font text-lg text-indigo-600">a</span></label>
                        <span id="val-a" class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-bold">2.0</span>
                    </div>
                    <input type="range" id="input-a" min="0.1" max="5" step="0.1" value="2.0" class="w-full">
                    <p class="text-xs text-slate-400 mt-1">注意：a > 0 且 a ≠ 1</p>
                </div>

                <!-- 真数 x 控制 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-medium text-slate-600">真数 (Value) <span class="math-font text-lg text-rose-500">x</span></label>
                        <span id="val-x" class="bg-rose-100 text-rose-700 px-2 py-1 rounded text-xs font-bold">4.0</span>
                    </div>
                    <input type="range" id="input-x" min="0.1" max="10" step="0.1" value="4.0" class="w-full">
                </div>
            </div>

            <!-- 计算结果 -->
            <div class="glow-card p-4 rounded-2xl flex items-center justify-between">
                <span class="text-slate-600 font-medium">计算结果 <span class="math-font">y</span> :</span>
                <span id="calc-result" class="text-2xl font-bold text-slate-800">2.00</span>
            </div>
        </div>

        <!-- 右侧：动态Canvas图像 -->
        <div class="lg:col-span-2">
            <div class="glow-card p-1 rounded-2xl h-full flex flex-col">
                <div class="p-4 flex justify-between items-center border-b border-slate-100">
                    <h3 class="font-semibold text-slate-700"><i class="fas fa-chart-line text-indigo-500 mr-2"></i>函数图像</h3>
                    <div class="flex space-x-4 text-xs text-slate-500">
                        <span class="flex items-center"><span class="w-3 h-3 bg-indigo-500 rounded-full mr-1"></span> y = logₐ(x)</span>
                        <span class="flex items-center"><span class="w-3 h-3 bg-slate-300 rounded-full mr-1"></span> y = 0 (X轴)</span>
                    </div>
                </div>
                <div class="canvas-container flex-grow" id="canvas-wrapper">
                    <canvas id="logCanvas"></canvas>
                    <!-- 悬浮提示框 -->
                    <div id="tooltip" class="absolute hidden bg-slate-800 text-white text-xs rounded px-2 py-1 pointer-events-none transform -translate-x-1/2 -translate-y-full transition-opacity"></div>
                </div>
                <div class="p-4 text-center text-slate-400 text-xs">
                    拖动左侧滑块实时观察曲线形态变化 | 当 0 < a < 1 时函数单调递减
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 变量初始化 ---
        const canvas = document.getElementById('logCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        
        // DOM 元素
        const inputA = document.getElementById('input-a');
        const inputX = document.getElementById('input-x');
        const valA = document.getElementById('val-a');
        const valX = document.getElementById('val-x');
        
        const dispBaseSub = document.getElementById('disp-base-sub');
        const dispXVal = document.getElementById('disp-x-val');
        const dispBasePow = document.getElementById('disp-base-pow');
        const dispYPow = document.getElementById('disp-y-pow');
        const dispResult = document.getElementById('disp-result');
        const calcResult = document.getElementById('calc-result');
        const tooltip = document.getElementById('tooltip');

        // 状态变量
        let baseA = 2.0;
        let valueX = 4.0;
        
        // 坐标系配置
        let scaleX = 50; // 1单位 = 50px
        let scaleY = 50;
        let offsetX = 0;
        let offsetY = 0;

        // --- 初始化设置 ---
        function resizeCanvas() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
            offsetX = canvas.width * 0.15; // 原点X偏移
            offsetY = canvas.height * 0.6; // 原点Y偏移
            draw();
        }

        window.addEventListener('resize', resizeCanvas);

        // --- 数学逻辑 ---
        function logBase(n, base) {
            return Math.log(n) / Math.log(base);
        }

        function updateValues() {
            baseA = parseFloat(inputA.value);
            // 防止 a = 1 的情况 (对数无定义)
            if (Math.abs(baseA - 1.0) < 0.05) {
                baseA = baseA < 1 ? 0.95 : 1.05;
                // inputA.value = baseA; // 可选：是否强制吸附
            }
            
            valueX = parseFloat(inputX.value);
            
            // 计算结果
            const y = logBase(valueX, baseA);
            
            // 更新UI文本
            valA.textContent = baseA.toFixed(1);
            valX.textContent = valueX.toFixed(1);
            
            dispBaseSub.textContent = baseA.toFixed(1);
            dispXVal.textContent = valueX.toFixed(1);
            
            dispBasePow.textContent = baseA.toFixed(1);
            dispYPow.textContent = y.toFixed(2);
            dispResult.textContent = valueX.toFixed(1);
            
            calcResult.textContent = y.toFixed(2);
            
            // 重新绘制
            draw();
        }

        // --- 绘图逻辑 ---
        function toCanvasX(x) {
            return offsetX + x * scaleX;
        }

        function toCanvasY(y) {
            return offsetY - y * scaleY;
        }

        function drawGrid() {
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.font = '10px Arial';
            ctx.fillStyle = '#94a3b8';

            // 垂直网格
            for(let x = 0; x <= (canvas.width - offsetX) / scaleX; x++) {
                const cx = toCanvasX(x);
                ctx.beginPath();
                ctx.moveTo(cx, 0);
                ctx.lineTo(cx, canvas.height);
                ctx.stroke();
                if(x !== 0) ctx.fillText(x, cx - 3, offsetY + 15);
            }
            
            // 水平网格
            const yStart = -Math.floor((canvas.height - offsetY) / scaleY);
            const yEnd = Math.floor(offsetY / scaleY);
            
            for(let y = yStart; y <= yEnd; y++) {
                const cy = toCanvasY(y);
                ctx.beginPath();
                ctx.moveTo(0, cy);
                ctx.lineTo(canvas.width, cy);
                ctx.stroke();
                if(y !== 0) ctx.fillText(y, offsetX - 15, cy + 3);
            }

            // 坐标轴
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            
            // X轴
            ctx.beginPath();
            ctx.moveTo(0, offsetY);
            ctx.lineTo(canvas.width, offsetY);
            ctx.stroke();
            
            // Y轴
            ctx.beginPath();
            ctx.moveTo(offsetX, 0);
            ctx.lineTo(offsetX, canvas.height);
            ctx.stroke();
            
            // 原点
            ctx.fillText("O", offsetX - 12, offsetY + 15);
        }

        function drawCurve() {
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#6366f1'; // Indigo-500
            
            // 辉光效果
            ctx.shadowColor = 'rgba(99, 102, 241, 0.5)';
            ctx.shadowBlur = 15;
            
            let startX = 0.05; // log(0) 无定义，从很小的正数开始
            let endX = (canvas.width - offsetX) / scaleX;
            
            let firstPoint = true;

            for (let x = startX; x <= endX; x += 0.05) {
                let y = logBase(x, baseA);
                let cx = toCanvasX(x);
                let cy = toCanvasY(y);
                
                // 限制绘图区域，防止数值溢出画布太远导致性能问题
                if (cy > -100 && cy < canvas.height + 100) {
                    if (firstPoint) {
                        ctx.moveTo(cx, cy);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(cx, cy);
                    }
                }
            }
            ctx.stroke();
            
            // 重置辉光，避免影响其他元素
            ctx.shadowBlur = 0;
        }

        function drawCurrentPoint() {
            const currentY = logBase(valueX, baseA);
            const cx = toCanvasX(valueX);
            const cy = toCanvasY(currentY);

            // 绘制虚线引导
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#f43f5e'; // Rose-500
            ctx.lineWidth = 1.5;
            
            // 垂直线
            ctx.beginPath();
            ctx.moveTo(cx, offsetY);
            ctx.lineTo(cx, cy);
            ctx.stroke();
            
            // 水平线
            ctx.beginPath();
            ctx.moveTo(offsetX, cy);
            ctx.lineTo(cx, cy);
            ctx.stroke();
            
            ctx.setLineDash([]); // 重置实线

            // 绘制点
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#f43f5e';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 绘制关键点 (1, 0)
            const oneZeroX = toCanvasX(1);
            const oneZeroY = toCanvasY(0);
            ctx.beginPath();
            ctx.arc(oneZeroX, oneZeroY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#0ea5e9'; // Sky-500
            ctx.fill();
            ctx.fillStyle = '#0f172a';
            ctx.font = '10px Arial';
            ctx.fillText("(1, 0)", oneZeroX + 5, oneZeroY - 5);
            
            // 绘制关键点 (a, 1)
            if (baseA <= (canvas.width - offsetX) / scaleX) {
                const aOneX = toCanvasX(baseA);
                const aOneY = toCanvasY(1);
                ctx.beginPath();
                ctx.arc(aOneX, aOneY, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#0ea5e9';
                ctx.fill();
                ctx.fillStyle = '#0f172a';
                ctx.fillText(`(a, 1)`, aOneX + 5, aOneY - 5);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawCurve();
            drawCurrentPoint();
        }

        // --- 事件监听 ---
        inputA.addEventListener('input', updateValues);
        inputX.addEventListener('input', updateValues);

        // Canvas 交互 - 鼠标/触摸跟随
        function handleInteraction(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            
            // 逆算 x 值
            let rawX = (mouseX - offsetX) / scaleX;
            
            // 限制范围
            if (rawX < 0.1) rawX = 0.1;
            if (rawX > 10) rawX = 10;
            
            // 更新 inputX 并触发更新
            inputX.value = rawX;
            updateValues();
        }

        let isDragging = false;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                handleInteraction(e.clientX, e.clientY);
            }
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            e.preventDefault(); // 防止滚动
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});
        
        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        // --- 启动 ---
        // 稍微延迟以确保容器尺寸计算正确
        setTimeout(() => {
            resizeCanvas();
            updateValues();
        }, 100);

    </script>
</body>
</html>
