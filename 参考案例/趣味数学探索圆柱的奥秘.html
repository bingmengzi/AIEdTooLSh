<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味数学：探索圆柱的奥秘</title>
    <!-- 引入 Tailwind CSS 进行现代 UI 布局 -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <!-- 引入 Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 Three.js 用于 3D 渲染 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.zcat.cn/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eduBlue: '#4285F4',
                        eduGreen: '#34A853',
                        eduYellow: '#FBBC05',
                        eduRed: '#EA4335',
                        bgLight: '#F0F7F4', // 护眼浅青绿
                        cardBg: '#ffffff',
                    },
                    fontFamily: {
                        sans: ['"Microsoft YaHei"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #F0F7F4; touch-action: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        /* 按钮点击动效 */
        .btn-press:active { transform: scale(0.95); }
        /* 隐藏的 UI 元素 */
        .hidden-ui { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen text-gray-800">

    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-eduBlue text-white flex items-center justify-center text-xl shadow-md">
                <i class="fas fa-shapes"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-700 tracking-wide">认识圆柱：互动探索实验室</h1>
        </div>
        <div class="flex gap-4">
            <span class="px-3 py-1 bg-eduGreen/10 text-eduGreen rounded-full text-sm font-bold border border-eduGreen/20">
                <i class="fas fa-hand-pointer mr-1"></i> 支持拖拽与旋转
            </span>
        </div>
    </header>

    <!-- 主体内容区 -->
    <main class="flex-1 flex p-4 gap-4 h-[calc(100vh-64px)] overflow-hidden">
        
        <!-- 左侧操作菜单 -->
        <aside class="w-72 flex flex-col gap-3">
            <!-- 模式选择卡片 -->
            <div class="bg-white rounded-2xl shadow-md p-4 flex flex-col gap-3 flex-1 border border-gray-100">
                <h2 class="text-lg font-bold text-gray-600 mb-2 border-b pb-2"><i class="fas fa-flask text-eduYellow mr-2"></i>探索任务</h2>
                
                <button onclick="app.setMode('intro')" id="btn-intro" class="mode-btn btn-press text-left px-4 py-4 rounded-xl transition-all duration-300 bg-eduBlue text-white shadow-md flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center"><i class="fas fa-search"></i></div>
                    <span class="text-lg font-bold">1. 认识各部分</span>
                </button>

                <button onclick="app.setMode('rotate')" id="btn-rotate" class="mode-btn btn-press text-left px-4 py-4 rounded-xl transition-all duration-300 bg-gray-50 text-gray-600 hover:bg-gray-100 flex items-center gap-3 border border-gray-200">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><i class="fas fa-sync-alt"></i></div>
                    <span class="text-lg font-bold">2. 旋转生成圆柱</span>
                </button>

                <button onclick="app.setMode('unfold')" id="btn-unfold" class="mode-btn btn-press text-left px-4 py-4 rounded-xl transition-all duration-300 bg-gray-50 text-gray-600 hover:bg-gray-100 flex items-center gap-3 border border-gray-200">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><i class="fas fa-scroll"></i></div>
                    <span class="text-lg font-bold">3. 侧面展开图</span>
                </button>

                <button onclick="app.setMode('section')" id="btn-section" class="mode-btn btn-press text-left px-4 py-4 rounded-xl transition-all duration-300 bg-gray-50 text-gray-600 hover:bg-gray-100 flex items-center gap-3 border border-gray-200">
                    <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><i class="fas fa-cut"></i></div>
                    <span class="text-lg font-bold">4. 切割截面</span>
                </button>
            </div>

            <!-- 装饰图 -->
            <div class="h-40 bg-white rounded-2xl shadow-md overflow-hidden flex-shrink-0 border border-gray-100 relative">
                 <img src="https://api.zcat.cn/udata/724954/png/f58454ce0bf139c4d9adcd096639f619.png" alt="Math Study" class="w-full h-full object-cover opacity-80">
                 <div class="absolute inset-0 bg-gradient-to-t from-white/80 to-transparent flex items-end p-3">
                     <p class="text-sm font-bold text-gray-600">滑动右侧3D视图查看各个角度</p>
                 </div>
            </div>
        </aside>

        <!-- 右侧主展示区 (Three.js 容器 + 悬浮UI) -->
        <section class="flex-1 relative bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden" id="canvas-container">
            <!-- Three.js Canvas 会被注入到这里 -->

            <!-- === 悬浮操作面板 (根据模式切换显示) === -->
            
            <!-- 1. 认识圆柱面板 -->
            <div id="ui-intro" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-4 rounded-2xl shadow-xl border border-gray-100 flex gap-4 transition-opacity">
                <button onclick="app.highlightPart('base')" class="btn-press px-6 py-2 bg-eduGreen text-white font-bold rounded-lg shadow hover:bg-green-600">点亮底面</button>
                <button onclick="app.highlightPart('side')" class="btn-press px-6 py-2 bg-eduBlue text-white font-bold rounded-lg shadow hover:bg-blue-600">点亮侧面</button>
                <button onclick="app.highlightPart('height')" class="btn-press px-6 py-2 bg-eduYellow text-white font-bold rounded-lg shadow hover:bg-yellow-500">显示高</button>
                <button onclick="app.highlightPart('reset')" class="btn-press px-6 py-2 bg-gray-500 text-white font-bold rounded-lg shadow hover:bg-gray-600"><i class="fas fa-undo"></i> 复原</button>
            </div>

            <!-- 2. 旋转生成面板 -->
            <div id="ui-rotate" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-4 rounded-2xl shadow-xl border border-gray-100 flex flex-col gap-3 hidden-ui">
                <div class="text-center font-bold text-gray-700">长方形长 5cm，宽 2cm</div>
                <div class="flex gap-4">
                    <button onclick="app.startRotation(5, 2)" class="btn-press px-6 py-3 bg-eduBlue text-white font-bold rounded-lg shadow-md hover:bg-blue-600">
                        以<span class="text-yellow-200 mx-1">长边</span>为轴旋转
                    </button>
                    <button onclick="app.startRotation(2, 5)" class="btn-press px-6 py-3 bg-eduGreen text-white font-bold rounded-lg shadow-md hover:bg-green-600">
                        以<span class="text-yellow-200 mx-1">宽边</span>为轴旋转
                    </button>
                </div>
            </div>

            <!-- 3. 展开图面板 -->
            <div id="ui-unfold" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-4 rounded-2xl shadow-xl border border-gray-100 flex flex-col items-center gap-3 hidden-ui w-80">
                <p class="font-bold text-gray-700">拖动滑块展开圆柱</p>
                <input type="range" id="unfold-slider" min="0" max="100" value="0" class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-eduBlue">
                <p class="text-sm text-eduBlue font-bold" id="unfold-text">闭合状态</p>
            </div>

            <!-- 4. 切割截面板 -->
            <div id="ui-section" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-4 rounded-2xl shadow-xl border border-gray-100 flex gap-4 hidden-ui">
                <button onclick="app.cutCylinder('horizontal')" class="btn-press px-6 py-3 bg-eduBlue text-white font-bold rounded-lg shadow-md hover:bg-blue-600 flex flex-col items-center">
                    <span class="">横 切</span><span class="text-xs font-normal opacity-80">(平行于底面)</span>
                </button>
                <button onclick="app.cutCylinder('vertical')" class="btn-press px-6 py-3 bg-eduGreen text-white font-bold rounded-lg shadow-md hover:bg-green-600 flex flex-col items-center">
                    <span class="">竖 切</span><span class="text-xs font-normal opacity-80">(沿高切下)</span>
                </button>
                <button onclick="app.cutCylinder('diagonal')" class="btn-press px-6 py-3 bg-eduYellow text-white font-bold rounded-lg shadow-md hover:bg-yellow-600 flex flex-col items-center">
                    <span class="">斜 切</span><span class="text-xs font-normal opacity-80">(斜穿侧面)</span>
                </button>
            </div>

            <!-- 信息提示卡片 (右上角) -->
            <div id="info-card" class="absolute top-6 right-6 glass-panel p-5 rounded-2xl shadow-lg border-l-4 border-eduYellow w-64 transform transition-all duration-500 opacity-0 translate-x-10 pointer-events-none">
                <h3 class="font-bold text-lg text-gray-800 mb-2" id="info-title">推理结果</h3>
                <div id="info-content" class="text-gray-600 font-medium leading-relaxed">
                    <!-- 动态内容 -->
                </div>
            </div>

        </section>
    </main>

    <!-- JavaScript 核心逻辑 -->
    <script>
        // === 全局应用管理对象 ===
        const app = {
            scene: null, camera: null, renderer: null, controls: null,
            container: document.getElementById('canvas-container'),
            currentMode: 'intro',
            
            // 存放各模式下的3D对象
            objects: {
                introGroup: new THREE.Group(),
                rotateGroup: new THREE.Group(),
                unfoldGroup: new THREE.Group(),
                sectionGroup: new THREE.Group()
            },

            // 动画相关状态
            animState: {
                isRotating: false,
                rotRect: null,
                rotCyl: null,
                rotAngle: 0,
                axisLength: 0,
                radiusLength: 0
            },

            // 材质库
            materials: {
                baseNormal: new THREE.MeshLambertMaterial({ color: 0xcccccc, transparent: true, opacity: 0.9, side: THREE.DoubleSide }),
                sideNormal: new THREE.MeshLambertMaterial({ color: 0x99ccff, transparent: true, opacity: 0.8, side: THREE.DoubleSide }),
                highlightBase: new THREE.MeshLambertMaterial({ color: 0x34A853, side: THREE.DoubleSide }), // Green
                highlightSide: new THREE.MeshLambertMaterial({ color: 0x4285F4, side: THREE.DoubleSide, transparent: true, opacity: 0.9 }), // Blue
                line: new THREE.LineBasicMaterial({ color: 0xFBBC05, linewidth: 3 }), // Yellow (高亮线)
                cutPlane: new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false }),
                cutLine: new THREE.LineBasicMaterial({ color: 0xEA4335, linewidth: 4 }) // Red (截面红线)
            },

            // 初始化 Three.js
            init: function() {
                // 1. 基础设置
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xF0F7F4); // 与页面背景一致，自然融入
                
                const aspect = this.container.clientWidth / this.container.clientHeight;
                this.camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
                this.camera.position.set(15, 12, 20);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;

                // 2. 光照设置
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
                dirLight.position.set(10, 20, 10);
                this.scene.add(dirLight);
                const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
                dirLight2.position.set(-10, -10, -10);
                this.scene.add(dirLight2);

                // 3. 将各模式的分组加入场景
                this.scene.add(this.objects.introGroup);
                this.scene.add(this.objects.rotateGroup);
                this.scene.add(this.objects.unfoldGroup);
                this.scene.add(this.objects.sectionGroup);

                // 4. 构建各模式内容
                this.buildIntroScene();
                this.buildRotateScene();
                this.buildUnfoldScene();
                this.buildSectionScene();

                // 5. 事件监听与自适应
                window.addEventListener('resize', () => this.onWindowResize(), false);
                document.getElementById('unfold-slider').addEventListener('input', (e) => this.handleUnfold(e.target.value));

                // 6. 启动
                this.setMode('intro');
                this.animate();
            },

            // 窗口自适应
            onWindowResize: function() {
                if(!this.camera || !this.renderer) return;
                this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            },

            // 主动画循环
            animate: function() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();

                // 处理旋转动画
                if (this.currentMode === 'rotate' && this.animState.isRotating) {
                    this.animState.rotAngle += 0.05;
                    if (this.animState.rotAngle <= Math.PI * 2) {
                        // 旋转长方形
                        this.animState.rotRect.rotation.y = this.animState.rotAngle;
                        // 更新圆柱扇形扫过角度
                        const geom = new THREE.CylinderGeometry(this.animState.radiusLength, this.animState.radiusLength, this.animState.axisLength, 32, 1, false, 0, this.animState.rotAngle);
                        this.animState.rotCyl.geometry.dispose();
                        this.animState.rotCyl.geometry = geom;
                    } else {
                        this.animState.isRotating = false;
                        this.showInfoCard("生成完毕！", `<p class="text-eduBlue font-bold text-xl">底面半径 = ${this.animState.radiusLength} cm</p><p class="text-eduGreen font-bold text-xl mt-2">高 = ${this.animState.axisLength} cm</p><p class="mt-3 text-sm text-gray-500"><i class="fas fa-lightbulb text-eduYellow"></i> 推理：以哪条边为轴，那条边就是高；另一条边就是底面半径。</p>`);
                    }
                }

                this.renderer.render(this.scene, this.camera);
            },

            // === UI 与模式切换逻辑 ===
            setMode: function(mode) {
                this.currentMode = mode;
                
                // 1. 更新左侧按钮样式
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('bg-eduBlue', 'text-white', 'shadow-md');
                    btn.classList.add('bg-gray-50', 'text-gray-600');
                    btn.querySelector('div').classList.remove('bg-white/20');
                    btn.querySelector('div').classList.add('bg-gray-200');
                });
                const activeBtn = document.getElementById(`btn-${mode}`);
                activeBtn.classList.add('bg-eduBlue', 'text-white', 'shadow-md');
                activeBtn.classList.remove('bg-gray-50', 'text-gray-600');
                activeBtn.querySelector('div').classList.add('bg-white/20');
                activeBtn.querySelector('div').classList.remove('bg-gray-200');

                // 2. 切换底部浮层 UI
                document.querySelectorAll('#canvas-container > div').forEach(el => {
                    if(el.id.startsWith('ui-')) el.classList.add('hidden-ui');
                });
                document.getElementById(`ui-${mode}`).classList.remove('hidden-ui');

                // 3. 切换 3D 场景显示
                Object.keys(this.objects).forEach(k => this.objects[k].visible = false);
                this.objects[`${mode}Group`].visible = true;

                // 4. 重置状态与相机
                this.hideInfoCard();
                this.camera.position.set(15, 12, 20);
                this.controls.target.set(0, 0, 0);

                if (mode === 'intro') this.highlightPart('reset');
                if (mode === 'rotate') this.resetRotation();
                if (mode === 'unfold') {
                    document.getElementById('unfold-slider').value = 0;
                    this.handleUnfold(0);
                    this.camera.position.set(0, 15, 25); // 正面俯视一点
                }
                if (mode === 'section') this.clearCut();
            },

            showInfoCard: function(title, htmlContent) {
                const card = document.getElementById('info-card');
                document.getElementById('info-title').innerText = title;
                document.getElementById('info-content').innerHTML = htmlContent;
                card.classList.remove('opacity-0', 'translate-x-10');
            },

            hideInfoCard: function() {
                const card = document.getElementById('info-card');
                card.classList.add('opacity-0', 'translate-x-10');
            },

            // ==========================================
            // 模式 1：认识圆柱
            // ==========================================
            buildIntroScene: function() {
                const group = this.objects.introGroup;
                
                // 侧面
                const sideGeom = new THREE.CylinderGeometry(4, 4, 10, 32, 1, true);
                this.introSide = new THREE.Mesh(sideGeom, this.materials.sideNormal);
                group.add(this.introSide);

                // 上下底面
                const topGeom = new THREE.CircleGeometry(4, 32);
                this.introTop = new THREE.Mesh(topGeom, this.materials.baseNormal);
                this.introTop.rotation.x = -Math.PI / 2;
                this.introTop.position.y = 5;
                group.add(this.introTop);

                this.introBottom = new THREE.Mesh(topGeom, this.materials.baseNormal);
                this.introBottom.rotation.x = Math.PI / 2;
                this.introBottom.position.y = -5;
                group.add(this.introBottom);

                // 高（中心虚线）
                const lineMat = new THREE.LineDashedMaterial({ color: 0xFBBC05, dashSize: 0.5, gapSize: 0.3, linewidth: 2 });
                const points = [];
                points.push(new THREE.Vector3(0, 5, 0));
                points.push(new THREE.Vector3(0, -5, 0));
                const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                this.introHeightLine = new THREE.Line(lineGeom, lineMat);
                this.introHeightLine.computeLineDistances(); // 必须调用才能显示虚线
                this.introHeightLine.visible = false;
                group.add(this.introHeightLine);
            },

            highlightPart: function(part) {
                // 重置
                this.introSide.material = this.materials.sideNormal;
                this.introTop.material = this.materials.baseNormal;
                this.introBottom.material = this.materials.baseNormal;
                this.introHeightLine.visible = false;
                this.hideInfoCard();

                if (part === 'base') {
                    this.introTop.material = this.materials.highlightBase;
                    this.introBottom.material = this.materials.highlightBase;
                    this.showInfoCard("底面", "圆柱的上、下两个面。<br><b>特征：</b>完全相同的两个圆。");
                } else if (part === 'side') {
                    this.introSide.material = this.materials.highlightSide;
                    this.showInfoCard("侧面", "周围的面。<br><b>特征：</b>是一个弯曲的面（曲面）。");
                } else if (part === 'height') {
                    this.introHeightLine.visible = true;
                    this.introSide.material = new THREE.MeshLambertMaterial({ color: 0x99ccff, transparent: true, opacity: 0.3 }); // 侧面变透明以便看清内部
                    this.showInfoCard("高", "两个底面之间的距离。<br><b>特征：</b>有无数条，长度都相等。");
                }
            },

            // ==========================================
            // 模式 2：旋转生成
            // ==========================================
            buildRotateScene: function() {
                const group = this.objects.rotateGroup;
                
                // 坐标轴辅助线
                const axesHelper = new THREE.AxesHelper(10);
                group.add(axesHelper);

                // 准备一个空壳，等点击按钮时再生成具体形状
                this.rotateContentGroup = new THREE.Group();
                group.add(this.rotateContentGroup);
            },

            resetRotation: function() {
                this.rotateContentGroup.clear();
                this.animState.isRotating = false;
                this.animState.rotAngle = 0;
            },

            startRotation: function(axisL, radiusL) {
                this.resetRotation();
                this.animState.axisLength = axisL;
                this.animState.radiusLength = radiusL;

                // 创建代表长方形的平面
                const rectGeom = new THREE.PlaneGeometry(radiusL, axisL);
                // 将原点移到边上，方便绕边旋转
                rectGeom.translate(radiusL / 2, axisL / 2, 0); 
                
                const rectMat = new THREE.MeshBasicMaterial({ color: 0xFBBC05, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
                this.animState.rotRect = new THREE.Mesh(rectGeom, rectMat);
                
                // 创建生成中的圆柱体 (初始角度为0)
                const cylGeom = new THREE.CylinderGeometry(radiusL, radiusL, axisL, 32, 1, false, 0, 0);
                cylGeom.translate(0, axisL / 2, 0); // 底部对齐 XZ 平面
                const cylMat = new THREE.MeshLambertMaterial({ color: 0x4285F4, transparent: true, opacity: 0.5 });
                this.animState.rotCyl = new THREE.Mesh(cylGeom, cylMat);

                this.rotateContentGroup.add(this.animState.rotRect);
                this.rotateContentGroup.add(this.animState.rotCyl);

                this.animState.isRotating = true;
                this.hideInfoCard();
            },

            // ==========================================
            // 模式 3：展开图
            // ==========================================
            buildUnfoldScene: function() {
                // 模拟展开效果：圆柱渐渐变透明缩窄，侧面矩形拉长，上下底圆平移
                const group = this.objects.unfoldGroup;
                const r = 3;
                const h = 8;
                const c = 2 * Math.PI * r; // 周长

                this.unfoldParams = { r, h, c };

                // 1. 原始圆柱(带缺口模拟展开)
                const cylMat = new THREE.MeshLambertMaterial({ color: 0x99ccff, side: THREE.DoubleSide, transparent:true });
                this.unfCyl = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 32, 1, true, 0, Math.PI*2), cylMat);
                // 旋转使缺口朝前
                this.unfCyl.rotation.y = -Math.PI / 2;
                group.add(this.unfCyl);

                // 2. 展开的侧面矩形
                const planeGeom = new THREE.PlaneGeometry(1, h); // 初始宽度极小
                planeGeom.translate(0.5, 0, 0); // 左侧对齐
                this.unfPlane = new THREE.Mesh(planeGeom, new THREE.MeshLambertMaterial({ color: 0x4285F4, side: THREE.DoubleSide }));
                this.unfPlane.position.set(0, 0, r); // 放在圆柱表面前侧
                this.unfPlane.visible = false;
                group.add(this.unfPlane);

                // 3. 上下底面
                const circleMat = new THREE.MeshLambertMaterial({ color: 0x34A853, side: THREE.DoubleSide });
                this.unfTop = new THREE.Mesh(new THREE.CircleGeometry(r, 32), circleMat);
                this.unfTop.rotation.x = -Math.PI / 2;
                this.unfTop.position.set(0, h/2, 0);
                group.add(this.unfTop);

                this.unfBottom = new THREE.Mesh(new THREE.CircleGeometry(r, 32), circleMat);
                this.unfBottom.rotation.x = Math.PI / 2;
                this.unfBottom.position.set(0, -h/2, 0);
                group.add(this.unfBottom);
            },

            handleUnfold: function(val) {
                const percent = val / 100;
                const p = this.unfoldParams;
                
                // 文本提示
                const txt = document.getElementById('unfold-text');
                if(percent === 0) txt.innerText = "闭合的圆柱";
                else if(percent === 1) txt.innerText = "完全展开";
                else txt.innerText = "展开中...";

                // 1. 圆柱缺口变大
                const remainAngle = (1 - percent) * Math.PI * 2;
                this.unfCyl.geometry.dispose();
                if(remainAngle > 0.01) {
                    this.unfCyl.geometry = new THREE.CylinderGeometry(p.r, p.r, p.h, 32, 1, true, 0, remainAngle);
                    this.unfCyl.visible = true;
                } else {
                    this.unfCyl.visible = false;
                }

                // 2. 侧面矩形变长
                if(percent > 0) {
                    this.unfPlane.visible = true;
                    this.unfPlane.scale.x = percent * p.c;
                    // 圆柱逐渐透明
                    this.unfCyl.material.opacity = 1 - percent * 0.5;
                } else {
                    this.unfPlane.visible = false;
                    this.unfCyl.material.opacity = 1;
                }

                // 3. 上下底面跟着矩形右侧边缘移动 (可选，这里设计为上下底停留在展开面中间，更符合常见图解)
                // 展开后矩形长度为 c，中心点在 c/2。
                const currentWidth = percent * p.c;
                // 让整个系统向左偏移，保持居中视觉
                const offsetX = -currentWidth / 2;
                
                this.unfCyl.position.x = offsetX;
                this.unfPlane.position.x = offsetX;
                
                // 底面放在展开矩形的中间靠上/下
                this.unfTop.position.x = offsetX + currentWidth / 2;
                this.unfTop.position.z = percent * p.r; // 向前平移贴合矩形
                
                this.unfBottom.position.x = offsetX + currentWidth / 2;
                this.unfBottom.position.z = percent * p.r;

                if(percent === 1) {
                    this.showInfoCard("展开图构成", `侧面展开是一个<b>长方形</b>。<br><br><span class="text-eduBlue">长方形的长 = 圆柱底面周长</span><br><span class="text-eduGreen">长方形的宽 = 圆柱的高</span>`);
                } else {
                    this.hideInfoCard();
                }
            },

            // ==========================================
            // 模式 4：切割截面
            // ==========================================
            buildSectionScene: function() {
                const group = this.objects.sectionGroup;
                
                // 基础圆柱（半透明）
                const geom = new THREE.CylinderGeometry(4, 4, 12, 32);
                const mat = new THREE.MeshLambertMaterial({ color: 0xcccccc, transparent: true, opacity: 0.3, depthWrite: false });
                this.secCylinder = new THREE.Mesh(geom, mat);
                group.add(this.secCylinder);

                // 用于存放切刀和轮廓线的容器
                this.secCutGroup = new THREE.Group();
                group.add(this.secCutGroup);
            },

            clearCut: function() {
                this.secCutGroup.clear();
                this.hideInfoCard();
            },

            cutCylinder: function(type) {
                this.clearCut();
                
                const planeGeom = new THREE.PlaneGeometry(16, 16);
                let cutPlane = new THREE.Mesh(planeGeom, this.materials.cutPlane);
                let lineGeom;

                if (type === 'horizontal') {
                    // 横切面
                    cutPlane.rotation.x = -Math.PI / 2;
                    cutPlane.position.y = 2; // 切在稍微偏上的位置
                    
                    // 轮廓线 (圆)
                    const curve = new THREE.EllipseCurve(0, 0, 4, 4, 0, 2 * Math.PI, false, 0);
                    const points = curve.getPoints(50);
                    lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeom, this.materials.cutLine);
                    line.rotation.x = -Math.PI / 2;
                    line.position.y = 2;
                    this.secCutGroup.add(line);

                    this.showInfoCard("横切面", `<div class="text-center"><div class="w-16 h-16 rounded-full bg-red-100 border-4 border-red-500 mx-auto my-3"></div><p class="text-xl font-bold text-eduRed">圆 形</p><p class="text-sm mt-2 text-gray-500">平行于底面切割，截面和底面大小一样。</p></div>`);

                } else if (type === 'vertical') {
                    // 竖切面
                    cutPlane.rotation.y = Math.PI / 2;
                    
                    // 轮廓线 (长方形：宽8，高12)
                    const points = [
                        new THREE.Vector3(0, 6, 4), new THREE.Vector3(0, -6, 4),
                        new THREE.Vector3(0, -6, -4), new THREE.Vector3(0, 6, -4),
                        new THREE.Vector3(0, 6, 4)
                    ];
                    lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeom, this.materials.cutLine);
                    this.secCutGroup.add(line);

                    this.showInfoCard("竖切面", `<div class="text-center"><div class="w-12 h-16 bg-red-100 border-4 border-red-500 mx-auto my-3"></div><p class="text-xl font-bold text-eduRed">长 方 形</p><p class="text-sm mt-2 text-gray-500">沿高（过轴）切下，长是底面直径，宽是高。</p></div>`);

                } else if (type === 'diagonal') {
                    // 斜切面
                    const angle = Math.PI / 6; // 30度
                    cutPlane.rotation.x = angle;
                    
                    // 轮廓线 (椭圆)
                    // 在倾斜平面上，原本半径为4的圆，在一个方向会被拉伸
                    const radiusY = 4 / Math.cos(angle); 
                    const curve = new THREE.EllipseCurve(0, 0, 4, radiusY, 0, 2 * Math.PI, false, 0);
                    const points = curve.getPoints(50);
                    // 转换为 3D 点并应用旋转
                    const vecPoints = points.map(p => new THREE.Vector3(p.x, p.y, 0));
                    lineGeom = new THREE.BufferGeometry().setFromPoints(vecPoints);
                    const line = new THREE.Line(lineGeom, this.materials.cutLine);
                    line.rotation.x = -Math.PI/2 + angle; 
                    this.secCutGroup.add(line);

                    this.showInfoCard("斜切面", `<div class="text-center"><div class="w-16 h-20 rounded-full bg-red-100 border-4 border-red-500 mx-auto my-3" style="border-radius: 50% / 40%;"></div><p class="text-xl font-bold text-eduRed">椭 圆 形</p><p class="text-sm mt-2 text-gray-500">不平行于底面斜着切，截面被拉长成了椭圆。</p></div>`);
                }

                // 添加网格辅助线让“刀面”看起来更明显
                const grid = new THREE.GridHelper(16, 16, 0xaaaaaa, 0xdddddd);
                grid.rotation.copy(cutPlane.rotation);
                grid.position.copy(cutPlane.position);
                
                this.secCutGroup.add(cutPlane);
                this.secCutGroup.add(grid);
            }
        };

        // 页面加载完成后启动应用
        window.onload = () => {
            app.init();
        };
    </script>

</body></html>
